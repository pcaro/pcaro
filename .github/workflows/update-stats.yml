name: Update GitHub Stats
on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update GitHub Stats
        uses: anuraghazra/github-readme-stats@master
        with:
          all: true
          commit_message: "📊 Update GitHub stats"
          theme: transparent
          hide_rank: true
          top_languages: true
          languages_limit: 6
          langs_cache: true
