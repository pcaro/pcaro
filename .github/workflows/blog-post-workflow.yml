name: Update blog posts
on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://pablocaro.es/en/feeds/all.atom.xml"
          max_post_count: 5
          commit_message: "📝 Update latest blog posts"
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix relative URLs
        run: |
          sed -i 's|](/en/|](https://pablocaro.es/en/|g' README.md

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🔗 Fix relative URLs to absolute"
          git push
